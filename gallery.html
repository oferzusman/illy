    :root {

      --radius: 28px;

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, "Rubik", "Noto Sans Hebrew", sans-serif;
      color: var(--text);
      background:

    body { padding: 16px; }
    a { color: inherit; text-decoration: none; }
    .wrap {
      width: min(1280px, 100%);
      margin: 0 auto;

    .top {
      display: flex;

      justify-content: space-between;

      padding: 18px 4px 8px;

    .title h1 {

      line-height: .95;
      letter-spacing: -.06em;
    }
    .title p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .back {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,247,232,.14);
      color: var(--text);
      font-weight: 700;
    }
    .back:hover {
      border-color: rgba(217,182,110,.36);
      background: rgba(217,182,110,.14);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .shot {
      padding: 0;
      border: 1px solid rgba(255,247,232,.10);
      border-radius: 22px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
      cursor: pointer;
    }
    .shot img {
      width: 100%;
      height: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      transition: transform .28s ease, filter .28s ease;
      filter: saturate(.95) contrast(1.03);
    }
    .shot:hover img {
      transform: scale(1.03);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.84);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: min(92vw, 1200px);
      max-height: 88vh;
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .close {
      position: fixed;
      top: 16px;
      left: 16px;
      min-width: 44px;
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: white;
      font-size: 28px;
      cursor: pointer;
    }

    @media (max-width: 980px) {

    }
    @media (max-width: 660px) {
      body { padding: 12px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .shot { border-radius: 18px; }
      .shot img { aspect-ratio: 3 / 4; }
    }

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" id="closeBtn" aria-label="סגור">×</button>
    <img id="lightboxImg" src="" alt="איליי זוסמן ריאל - צפייה בתמונה">
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');

    document.querySelectorAll('.shot').forEach(btn => {
      btn.addEventListener('click', () => {
        lightboxImg.src = btn.dataset.src;
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImg.src = '';
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
